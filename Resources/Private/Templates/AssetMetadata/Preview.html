<f:layout name="Module" />
<f:section name="Content">
  <div class="cf-module">
    <header class="cf-hero"><div class="cf-brand-copy"><span class="cf-eyebrow">ASSET INTELLIGENCE · REVIEW</span><div class="cf-main-row"><div class="cf-logo cf-logo-wordmark"><img src="{f:uri.resource(path: 'Icons/contentflow-module.svg')}" alt="ContentFlow AI" /></div><div class="cf-heading"><h1>Review metadata</h1><p>Approve the generated fields before writing them to TYPO3.</p></div></div></div><span class="cf-status"><i></i> Analysis complete</span></header>
    <f:render partial="ProductMenu" arguments="{currentProduct: 'Asset Intelligence'}" />
    <div class="cf-jobbar"><span>Images <b>{assetCount}</b></span><span>{meta.provider} · {meta.model}</span></div>
    <div class="cf-asset-batch-review">
      <f:for each="{assets}" as="asset" iteration="iteration">
        <section class="cf-asset-review">
          <aside class="cf-asset-preview"><img src="{asset.publicUrl}" alt="Selected TYPO3 asset preview" /><small>{asset.fileName} · UID {asset.fileUid}</small></aside>
          <div class="cf-card"><div class="cf-card-header"><div class="cf-card-title"><span class="cf-step">{iteration.cycle}</span><h2>{asset.fileName}</h2></div></div><div class="cf-card-body cf-metadata-fields"><f:for each="{asset.metadata}" as="value" key="field"><div><span>{field}</span><p>{value}</p></div></f:for></div></div>
        </section>
      </f:for>
    </div>
    <footer class="cf-batch-footer"><f:link.action action="index" class="btn btn-default">Discard</f:link.action><f:form action="apply" method="post" class="cf-approve-form"><f:form.hidden name="previewToken" value="{previewToken}" /><button type="submit" class="btn btn-primary cf-primary cf-approve-submit"><span>Approve and save all</span></button></f:form></footer>
    <f:for each="{debugItems}" as="debugItem"><f:render partial="Debug/Exchange" arguments="{debug: debugItem.exchange}" /></f:for>
  </div>
</f:section>
